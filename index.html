```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamil Creator Runner</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===========================
     GAME CONTAINER
============================ -->

<div id="game">

    <!-- Moving Background -->
    <div id="background1" class="background"></div>
    <div id="background2" class="background"></div>

    <!-- Ground -->
    <div id="ground"></div>

    <!-- Obstacles -->
    <div id="obstacleContainer"></div>

    <!-- Player -->
    <img id="player" src="images/goofyStanding.png" draggable="false">

    <!-- HUD -->
    <div id="hud">

        <div id="scoreBox">
            <div id="score">Score : 0</div>
            <div id="speed">Speed : 1.0x</div>
            <div id="coins">Coins : 0</div>
        </div>

        <div id="bestBox">
            Best : <span id="bestScore">0</span>
        </div>

    </div>

</div>

<!-- ===========================
     START SCREEN
============================ -->

<div id="startScreen">

    <h1>Tamil Creator Runner</h1>

    <p>
        Press SPACE or TAP to Start
    </p>

</div>

<!-- ===========================
     GAME OVER
============================ -->

<div id="gameOver" class="hidden">

    <h1>GAME OVER</h1>

    <h2 id="finalScore">
        Score : 0
    </h2>

    <button id="restartBtn">
        Play Again
    </button>

</div>

<!-- ===========================
     CHARACTER SELECT
     (Hidden for now)
============================ -->

<div id="characterMenu" class="hidden">

</div>

<!-- ===========================
     AUDIO
============================ -->

<!-- Background Music -->
<audio
id="bgMusic"
loop
preload="auto">

<source
src="sounds/background.mp3"
type="audio/mpeg">

</audio>

<!-- Character Lose Voice -->
<audio
id="characterVoice"
preload="auto">

</audio>

<!-- ===========================
     JAVASCRIPT
============================ -->

<script src="constants.js"></script>
<script src="storage.js"></script>
<script src="player.js"></script>
<script src="obstacles.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>

</body>
</html>
```
