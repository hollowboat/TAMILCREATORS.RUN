<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Creator Runner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
  <div id="background1" class="background"></div>
  <div id="background2" class="background"></div>

  <div id="ground"></div>

  <div id="obstacleContainer"></div>

  <img id="player" src="images/goofystanding.png" alt="Player">

  <div id="hud">
    <div id="score">Score: 0</div>
    <div id="speed">Speed: 1.0x</div>
    <div id="coins">Coins: 0</div>
    <div id="best">Best: 0</div>
  </div>
</div>

<section id="characterMenu" class="hidden">
  <h1>Choose Your Creator</h1>
  <div id="carousel"></div>
  <button id="playBtn">PLAY</button>
</section>

<section id="startScreen">
  <h1>Tamil Creator Runner</h1>
  <p>Press SPACE or TAP to Start</p>
</section>

<section id="gameOver" class="hidden">
  <h1>GAME OVER</h1>
  <h2 id="finalScore">Score: 0</h2>
  <button id="restartBtn">Play Again</button>
</section>

<audio id="bgMusic" preload="auto" loop>
  <source src="sounds/background.mp3" type="audio/mpeg">
</audio>

<audio id="characterVoice" preload="auto"></audio>

<script src="game.js"></script>

</body>
</html>
